name: Build, Test and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :packages:intellij:buildPlugin --no-daemon

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ide-event-sounds-plugin
        path: packages/intellij/build/distributions/*.jar

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: packages/intellij/build/distributions/*.jar
        asset_name: ide-event-sounds-${{ github.event.release.tag_name }}.jar
        asset_content_type: application/java-archive