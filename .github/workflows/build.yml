name: Build, Test and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.0.2)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :packages:intellij:buildPlugin --no-daemon

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ide-event-sounds-plugin-${{ github.run_number }}
        path: packages/intellij/build/libs/ide-event-sounds-*.jar
        retention-days: 5

    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ inputs.version }}
        release_name: IDE Event Sounds v${{ inputs.version }}
        draft: false
        prerelease: false

    - name: Upload to Release
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: packages/intellij/build/libs/ide-event-sounds-*.jar
        asset_name: ide-event-sounds-${{ inputs.version }}.jar
        asset_content_type: application/java-archive